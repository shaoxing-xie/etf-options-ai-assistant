[pytest]
testpaths = tests
python_files = test_*.py
addopts = -q
# 安装 requirements-dev.txt 后可用 pytest-timeout，例如：pytest --timeout=60 tests/...
filterwarnings =
    ignore:.*pkg_resources is deprecated.*:DeprecationWarning
    ignore:.*declare_namespace\('zope'\).*:DeprecationWarning
markers =
    integration: 依赖网络/行情；CI 可加 -m "not integration" 跳过

