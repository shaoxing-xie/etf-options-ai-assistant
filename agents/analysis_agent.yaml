# 分析 Agent 配置
# 负责趋势分析、波动预测、信号生成、风险评估等分析任务

name: analysis_agent
description: 分析 Agent，负责趋势分析、波动预测、信号生成、风险评估

# Agent 配置
agent:
  type: tool_agent
  tools:
    # 技术指标
    - tool_calculate_technical_indicators_unified
    
    # 趋势分析
    - tool_analyze_after_close
    # 盘后分析 + 日报发送进程内串接（cron 优先，避免模型传大 JSON）
    - tool_analyze_after_close_and_send_daily_report
    - tool_analyze_before_open
    - tool_analyze_opening_market
    
    # 波动率预测
    - tool_predict_volatility
    - tool_calculate_historical_volatility
    - tool_underlying_historical_snapshot
    - tool_predict_intraday_range
    - tool_predict_daily_volatility_range
    - tool_compute_index_key_levels
    # 日报 / 盘后补采（与 workflows/daily_market_report.yaml、tool_send_daily_report ingest 对齐；原在 data_collector_agent）
    - tool_fetch_global_index_spot
    - tool_fetch_etf_realtime
    - tool_fetch_policy_news
    - tool_fetch_announcement_digest
    - tool_sector_heat_score
    - tool_fetch_macro_commodities
    - tool_record_before_open_prediction
    - tool_get_yesterday_prediction_review
    
    # 信号生成（期权主名 + 兼容别名 + ETF / A 股）
    - tool_generate_option_trading_signals
    - tool_generate_signals
    - tool_generate_etf_trading_signals
    - tool_generate_stock_trading_signals
    # 多路 Rule 聚合 + 融合（OpenClaw 应优先用于「综合信号/一致性」类问题）
    - tool_strategy_engine
    - tool_internal_alert_scan
    
    # 风险评估
    - tool_assess_risk

    # 市场体制 / 轮动 / 策略研究 / 候选多因子排序（与 plugins/analysis README、ota-* Skill 对齐）
    - tool_detect_market_regime
    - tool_etf_rotation_research
    - tool_strategy_research
    - tool_quantitative_screening
    
    # ETF趋势跟踪
    - tool_check_etf_index_consistency
    - tool_generate_trend_following_signal
    
    # 仓位管理
    - tool_calculate_position_size
    - tool_check_position_limit
    - tool_apply_hard_limit
    
    # 风险管理
    - tool_calculate_stop_loss_take_profit
    - tool_check_stop_loss_take_profit
    
    # 策略效果跟踪
    - tool_record_signal_effect
    - tool_get_strategy_performance
    - tool_calculate_strategy_score
    - tool_adjust_strategy_weights
    - tool_get_strategy_weights
    
    # 数据访问工具（分析agent需要读取数据进行分析）
    - tool_read_index_daily
    - tool_read_index_minute
    - tool_read_etf_daily
    - tool_read_etf_minute
    - tool_read_option_minute
    - tool_read_option_greeks

# 定时任务配置
schedules:
  # 调度逻辑名；OpenClaw 工作流 YAML 见 workflows/after_close_analysis_enhanced.yaml（已移除精简版 after_close_analysis.yaml）
  - name: after_close_analysis
    cron: "30 15 * * 1-5"  # 工作日 15:30
    task: after_close_analysis_task
  
  - name: before_open_analysis
    cron: "15 9 * * 1-5"  # 工作日 9:15
    task: before_open_analysis_task
  
  - name: opening_market_analysis
    cron: "28 9 * * 1-5"  # 工作日 9:28
    task: opening_market_analysis_task
  
  # 盘中：日内波动 + 轻量区间 + 日频全日区间（三者口径不同，分步调用）
  - name: intraday_volatility_range
    cron: "*/30 9-15 * * 1-5"  # 工作日 9:00-15:00 每30分钟
    task: intraday_volatility_range_task
  
  - name: signal_generation
    cron: "*/5 9-15 * * 1-5"  # 工作日 9:00-15:00 每5分钟
    task: signal_generation_task

  # 策略引擎融合：与单路 signal_generation 并行；输出 candidates + fused，供通知/风控前组合观点
  - name: strategy_fusion
    cron: "*/30 9-15 * * 1-5"  # 工作日 9:00-15:00 每30分钟
    task: strategy_fusion_task

  # 策略反思任务：在次日凌晨回顾前一交易日信号表现并调整策略权重
  - name: strategy_reflection
    cron: "0 3 * * 2-6"  # 每周二到周六凌晨3点（对应前一交易日）
    task: strategy_reflection_task

# 任务定义
tasks:
  after_close_analysis_task:
    steps:
      - tool: tool_analyze_after_close
  
  before_open_analysis_task:
    steps:
      - tool: tool_analyze_before_open
  
  opening_market_analysis_task:
    steps:
      - tool: tool_analyze_opening_market
  
  intraday_volatility_range_task:
    steps:
      - tool: tool_predict_volatility
        params:
          underlying: "510300"
      - tool: tool_predict_intraday_range
        params:
          symbol: "510300"
      - tool: tool_predict_daily_volatility_range
        params:
          underlying: "510300"

  signal_generation_task:
    steps:
      - tool: tool_generate_option_trading_signals
        params:
          underlying: "510300"

  # 策略融合：与 workflows/strategy_fusion_routine.yaml 一致；默认单标的 510300。
  # 多 ETF 时改为逗号分隔，例如 underlying: "510300,510500" 与 index_code: "000300,000905"（同序对齐）。
  strategy_fusion_task:
    steps:
      - tool: tool_strategy_engine
        params:
          underlying: "510300"
          index_code: "000300"
          use_dynamic_weights: true
          write_journal: true

  strategy_reflection_task:
    steps:
      - tool: tool_get_strategy_performance
        params:
          strategy: "default"
      - tool: tool_calculate_strategy_score
        depends_on: [tool_get_strategy_performance]
        params:
          strategy: "default"
      - tool: tool_adjust_strategy_weights
        depends_on: [tool_calculate_strategy_score]
        params:
          current_weights: {}  # 由上游系统填充当前策略权重
