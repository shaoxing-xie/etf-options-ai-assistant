# 数据采集 Agent 配置
# 行情与参考数据工具由 Gateway 插件 openclaw-data-china-stock 注册（见该扩展 config/tools_manifest.json）。
# 本仓库 plugins/data_collection 为指向该仓库的符号链接，仅供 Python 内部 import；勿与 option-trading-assistant 的 manifest 重复理解。

name: data_collector_agent
description: |
  数据采集 Agent：在 Gateway 上调用 openclaw-data-china-stock 已注册的 tool_*（统一入口 tool_fetch_market_data、
  各类 fetch/read、A 股 P0/P1 等）。下列 id 须与该插件 manifest 一致。

agent:
  type: tool_agent
  tools:
    # ---------- 合并入口（merged/，内部委托 plugins.data_collection） ----------
    - tool_fetch_index_data
    - tool_fetch_etf_data
    - tool_fetch_option_data
    - tool_read_market_data

    # ---------- 指数 ----------
    - tool_fetch_index_realtime
    - tool_fetch_index_historical
    - tool_fetch_index_minute
    - tool_fetch_index_opening
    - tool_fetch_global_index_spot

    # ---------- ETF ----------
    - tool_fetch_etf_realtime
    - tool_fetch_etf_historical
    - tool_fetch_etf_minute
    - tool_fetch_etf_iopv_snapshot

    # ---------- 期权 ----------
    - tool_fetch_option_realtime
    - tool_fetch_option_greeks
    - tool_fetch_option_minute

    # ---------- 期货 / 板块 ----------
    - tool_fetch_a50_data
    - tool_fetch_sector_data

    # ---------- A 股个股 ----------
    - tool_fetch_stock_historical
    - tool_fetch_stock_minute
    - tool_fetch_stock_realtime
    - tool_fetch_stock_financials
    - tool_stock_data_fetcher
    - tool_stock_monitor

    # ---------- 工具（合约、交易时间、时段、可交易性） ----------
    - tool_get_option_contracts
    - tool_check_trading_status
    - tool_get_a_share_market_regime
    - tool_filter_a_share_tradability

    # ---------- 涨停 / 板块热度 / 资金 / 北向 / 龙虎榜 ----------
    - tool_fetch_limit_up_stocks
    - tool_sector_heat_score
    - tool_write_limit_up_with_sector
    - tool_limit_up_daily_flow
    - tool_dragon_tiger_list
    - tool_capital_flow
    - tool_fetch_a_share_fund_flow
    - tool_fetch_a_share_technical_screener
    - tool_fetch_northbound_flow
    - tool_fetch_policy_news
    - tool_fetch_macro_commodities
    - tool_fetch_overnight_futures_digest
    - tool_conditional_overnight_futures_digest
    - tool_fetch_announcement_digest

    # ---------- 数据访问（缓存读取，别名亦指向 tool_read_market_data） ----------
    - tool_read_index_daily
    - tool_read_index_minute
    - tool_read_etf_daily
    - tool_read_etf_minute
    - tool_read_option_minute
    - tool_read_option_greeks

# 定时任务配置
schedules:
  - name: morning_data_collection
    cron: "15 9 * * 1-5"
    task: collect_morning_data

  - name: intraday_data_collection_morning
    cron: "30-59/5 9 * * 1-5"
    task: collect_intraday_data
  - name: intraday_data_collection_midday
    cron: "*/5 10-11 * * 1-5"
    task: collect_intraday_data
  - name: intraday_data_collection_afternoon
    cron: "*/5 13-14 * * 1-5"
    task: collect_intraday_data
  - name: intraday_data_collection_closing
    cron: "0-0/5 15 * * 1-5"
    task: collect_intraday_data

tasks:
  collect_morning_data:
    steps:
      - tool: tool_fetch_index_historical
        params:
          index_code: "000300"
          period: "daily"
          lookback_days: 5
      - tool: tool_fetch_etf_historical
        params:
          etf_code: "510300"
          period: "daily"
          lookback_days: 5

  collect_intraday_data:
    steps:
      - tool: tool_fetch_index_minute
        params:
          index_code: "000300"
          period: "5"
      - tool: tool_fetch_etf_minute
        params:
          etf_code: "510300"
          period: "5"
      - tool: tool_fetch_option_greeks
        params:
          contract_code: "10010466"
