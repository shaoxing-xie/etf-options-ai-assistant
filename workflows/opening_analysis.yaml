# 9:20 开盘行情分析（预开盘执行版）
# 与 9:40 开盘实盘报告配套：本任务侧重竞价快照、执行预案与开盘前后衔接。
# 执行时间：工作日 9:20。
# 功能：竞价快照 + 板块温度 + 资金与成交状态 + 跟踪标的 + 当日预判。
#
# Cron 硬推荐（单次调用）：tool_run_opening_analysis_and_send(mode='prod', fetch_mode='production')
# 进程内按本文件 steps 顺序采集并组装 report_data，经 tool_send_analysis_report → send_daily_report 渲染钉钉；
# 不经主模型传递大 JSON。排障可仍按下列 structured_message 逐步调用各 tool_*。
# 数据不全/N/A：优先查 report_data 合并键与 send_daily_report 读取路径，禁止默认归因「采集坏了/网络不稳」（见 docs/ops/cron_opening_analysis_triage.md）。
#
# 已覆盖历史轻量开盘链路（实时/ETF/技术/日内区间/开盘分析/信号）；本文件另含机构晨报采集、predict_volatility、prediction_review。
# 钉钉正文见 send_daily_report：opening 与 before_open 共用章节顺序（独立完整版，非盘前增量）。

name: opening_analysis
description: 9:20 开盘行情分析（预开盘执行版）

schedule: "20 9 * * 1-5"
timezone: "Asia/Shanghai"

steps:
  - name: check_trading_status
    agent: data_collector_agent
    tool: tool_check_trading_status
    description: A股时段/连续竞价措辞门禁（必选；结果并入 report_data）
    params: {}
    continue_on_failure: true

  - name: fetch_index_opening
    agent: data_collector_agent
    tool: tool_fetch_index_opening
    description: 指数开盘/竞价相关数据
    params: {}
    continue_on_failure: true
    depends_on: [check_trading_status]

  - name: fetch_global_index_spot
    agent: data_collector_agent
    tool: tool_fetch_global_index_spot
    description: 全球指数（道指/纳指/标普/恒指等）
    params: {}
    continue_on_failure: true
    depends_on: [check_trading_status]

  - name: fetch_global_index_hist_sina
    agent: data_collector_agent
    tool: tool_fetch_global_index_hist_sina
    description: 全球指数历史日线（上一完整交易日收盘口径；欧股/日经/韩国/台湾等），按需用于补齐 spot 缺口
    params:
      symbol: "^GDAXI"
      limit: 2
    continue_on_failure: true
    depends_on: [fetch_global_index_spot]

  - name: fetch_policy_news
    agent: data_collector_agent
    tool: tool_fetch_policy_news
    description: 政策要闻 Tavily
    params:
      max_items: 5
    continue_on_failure: true

  - name: fetch_macro_commodities
    agent: data_collector_agent
    tool: tool_fetch_macro_commodities
    description: 原油/黄金/铜
    params: {}
    continue_on_failure: true

  - name: fetch_overnight_digest
    agent: data_collector_agent
    tool: tool_fetch_overnight_futures_digest
    description: A50/金龙检索摘要（主源失败时兜底）
    params: {}
    continue_on_failure: true

  - name: fetch_announcement_digest
    agent: data_collector_agent
    tool: tool_fetch_announcement_digest
    description: 重大公告线索
    params:
      max_items: 5
    continue_on_failure: true

  - name: fetch_sector_heat
    agent: data_collector_agent
    tool: tool_sector_heat_score
    description: 板块热度
    params: {}
    continue_on_failure: true

  - name: sentiment_limit_up
    agent: data_collector_agent
    tool: tool_fetch_limit_up_stocks
    description: 09:20 前情绪前置检查：涨停生态
    params: {}
    continue_on_failure: true
    depends_on: [check_trading_status]

  - name: sentiment_fund_flow
    agent: data_collector_agent
    tool: tool_fetch_a_share_fund_flow
    description: 09:20 前情绪前置检查：A股资金流向
    params:
      query_kind: "market_history"
      max_days: 5
    continue_on_failure: true
    depends_on: [check_trading_status]

  - name: sentiment_northbound
    agent: data_collector_agent
    tool: tool_fetch_northbound_flow
    description: 09:20 前情绪前置检查：北向资金
    params:
      lookback_days: 5
    continue_on_failure: true
    depends_on: [check_trading_status]

  - name: sentiment_sector_structure
    agent: data_collector_agent
    tool: tool_fetch_sector_data
    description: 09:20 前情绪前置检查：板块结构
    params:
      sector_type: "industry"
      period: "today"
    continue_on_failure: true
    depends_on: [check_trading_status]

  - name: compute_key_levels
    agent: analysis_agent
    tool: tool_compute_index_key_levels
    description: 沪深300 关键位
    params:
      index_code: "000300"
    continue_on_failure: true

  - name: fetch_index_realtime
    agent: data_collector_agent
    tool: tool_fetch_index_realtime
    description: 主要指数实时（开盘时段）
    params:
      index_code: "000300,000016,000001,399006"
    continue_on_failure: true

  - name: fetch_etf_realtime
    agent: data_collector_agent
    tool: tool_fetch_etf_realtime
    description: 宽基 ETF 实时
    params:
      etf_code: "510300,510050,510500"
    continue_on_failure: true

  - name: technical_indicators
    agent: analysis_agent
    tool: tool_calculate_technical_indicators_unified
    description: 技术指标（日线缓存；含 ATR 供波动与风险叙事，可选再加 kdj）
    params:
      symbol: "510300"
      data_type: "etf_daily"
      indicators:
        - ma
        - macd
        - rsi
        - bollinger
        - atr
      task_key: "opening_analysis"
    continue_on_failure: true

  - name: analyze_opening_market
    agent: analysis_agent
    tool: tool_analyze_opening_market
    description: 开盘市场分析（moment=opening）
    params: {}
    depends_on: [fetch_global_index_spot]

  - name: predict_volatility
    agent: analysis_agent
    tool: tool_predict_volatility
    description: 波动率预测
    params:
      underlying: "510300"
    depends_on: [analyze_opening_market]

  - name: predict_intraday_range
    agent: analysis_agent
    tool: tool_predict_intraday_range
    description: 日内区间（剩余时段/轻量分钟口径）
    params:
      symbol: "510300"
    depends_on: [predict_volatility]

  - name: predict_daily_volatility_range
    agent: analysis_agent
    tool: tool_predict_daily_volatility_range
    description: 日频全日波动区间（与日内工具分字段）
    params:
      underlying: "510300"
    depends_on: [predict_intraday_range]

  - name: prediction_review
    agent: analysis_agent
    tool: tool_get_yesterday_prediction_review
    description: 昨日预测粗检（可选）
    params: {}
    continue_on_failure: true

  - name: generate_opening_signals
    agent: analysis_agent
    tool: tool_generate_option_trading_signals
    description: 生成开盘交易信号 → 写入 report_data.signals
    params:
      underlying: "510300"
    depends_on:
      [
        sentiment_limit_up,
        sentiment_fund_flow,
        sentiment_northbound,
        sentiment_sector_structure,
        technical_indicators,
        predict_intraday_range,
        predict_daily_volatility_range,
        analyze_opening_market,
      ]
    continue_on_failure: true

  - name: send_opening_report
    agent: notification_agent
    tool: tool_send_analysis_report
    description: 发送开盘独立完整版晨报（钉钉）
    params:
      report_type: "opening"
    depends_on:
      [
        analyze_opening_market,
        predict_volatility,
        predict_intraday_range,
        predict_daily_volatility_range,
        prediction_review,
        generate_opening_signals,
      ]

structured_message: |
  【自包含】勿读外部 research.md；以本 YAML 步骤与下文字段为准。
  本任务是 09:20 的「开盘行情分析（预开盘执行版）」：输出竞价快照、板块温度、资金与成交状态、跟踪标的与当日执行。

  【Cron 硬推荐】唯一动作：调用一次 `tool_run_opening_analysis_and_send(mode='prod', fetch_mode='production', report_variant='legacy')`。禁止多轮拼 report_data。

  【手工/排障】须合并全部工具 JSON 为一份 report_data，再调用 tool_send_analysis_report（report_type="opening", mode=prod）。

  **时段门禁（必选）**
  0) `tool_check_trading_status` → `report_data.trading_status`。
     - 若 `allows_intraday_continuous_wording=false`，正文改“非开盘实时，仅复盘口径”，禁止盘中实况措辞。

  **采集（开盘导向）**
  1) tool_fetch_index_opening → 竞价与开盘快照
  2) tool_fetch_global_index_spot + tool_fetch_global_index_hist_sina → 外盘背景（仅背景节）
  3) tool_fetch_policy_news / tool_fetch_macro_commodities / tool_fetch_overnight_futures_digest → 背景信息
  4) tool_sector_heat_score → 板块温度（强弱与扩散）
  4b) `tool_fetch_limit_up_stocks` + `tool_fetch_a_share_fund_flow` + `tool_fetch_northbound_flow` + `tool_fetch_sector_data`
      → 09:20 前情绪前置检查。若运行环境支持 `market-sentinel` 规程，应将四工具聚合为 `report_data.sentiment_precheck`，至少含
      `overall_score` / `sentiment_stage` / `data_completeness_ratio` / `action_bias` / `risk_counterevidence` / `degraded`。
  5) tool_fetch_index_realtime / tool_fetch_etf_realtime → 大盘与ETF实时快照
  6) tool_compute_index_key_levels / tool_calculate_technical_indicators_unified → 关键位与风险
  7) tool_analyze_opening_market / tool_predict_volatility / tool_predict_intraday_range / tool_predict_daily_volatility_range / tool_generate_option_trading_signals
     → 当日预判与执行动作

  **情绪门禁（新增）**
  - 若 `sentiment_stage` 为 `冰点` 或 `退潮`：正文必须增加防御性提示，降低“进攻/追涨”措辞，不得把开盘信号写成高确定性方向。
  - 若 `sentiment_stage` 为 `高潮`：必须增加“过热/拥挤”反证检查，提示关注 vega / 波动率暴露，避免单边乐观表述。
  - 若 `degraded=true` 或 `status=insufficient_evidence`：必须显式披露，并将情绪结论降级为背景参考，不得当作核心决策前提。

  **正文约束**
  - 删除“北向资金”独立小节。
  - “资金与成交状态”必须基于当日可交易意义的数据（资金流向、成交节奏、量价一致性）。
  - 隔夜内容仅保留背景一段，不得占主段。
