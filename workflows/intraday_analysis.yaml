# 日内分析工作流
# 执行时间：工作日 9:00-15:00，每15分钟
# 功能：日内实时分析、技术指标、趋势分析、信号生成、风险评估

name: intraday_analysis
description: 日内分析工作流，在交易时间内定期进行实时分析和信号生成

schedule: "*/15 9-15 * * 1-5"  # 工作日 9:00-15:00，每15分钟（Cron格式）

steps:
  - name: fetch_limit_up_stocks
    tool: tool_fetch_limit_up_stocks
    description: 盘中情绪快照：涨停生态
    params: {}

  - name: fetch_a_share_fund_flow
    tool: tool_fetch_a_share_fund_flow
    description: 盘中情绪快照：A股资金流向
    params:
      query_kind: "market_history"
      max_days: 5

  - name: fetch_northbound_flow
    tool: tool_fetch_northbound_flow
    description: 盘中情绪快照：北向资金
    params:
      lookback_days: 5

  - name: fetch_sector_data
    tool: tool_fetch_sector_data
    description: 盘中情绪快照：板块结构
    params:
      sector_type: "industry"
      period: "today"

  - name: fetch_minute_data
    tool: tool_fetch_index_minute
    description: 获取指数分钟数据
    params:
      index_code: "000300"
      period: "5"
      lookback_days: 1
    
  - name: fetch_etf_minute
    tool: tool_fetch_etf_minute
    description: 获取ETF分钟数据
    params:
      etf_code: "510300"
      period: "5"
      lookback_days: 1
    
  - name: fetch_option_realtime
    tool: tool_fetch_option_realtime
    description: 获取期权实时数据
    
  - name: fetch_option_greeks
    tool: tool_fetch_option_greeks
    description: 获取期权Greeks数据
    
  - name: technical_analysis
    tool: tool_calculate_technical_indicators_unified
    description: 技术指标分析（分钟线 + ATR；standard 下可加 kdj 等，注意 lookback 要够）
    params:
      symbol: "510300"
      data_type: "etf_minute"
      lookback_days: 5
      indicators:
        - ma
        - macd
        - rsi
        - bollinger
        - atr
      task_key: "intraday_analysis"
    
  - name: volatility_prediction
    tool: tool_predict_volatility
    description: 预测波动率区间
    params:
      underlying: "510300"
    
  - name: intraday_range
    tool: tool_predict_intraday_range
    description: 预测日内波动区间
    params:
      symbol: "510300"
    
  - name: generate_intraday_signals
    tool: tool_generate_option_trading_signals
    description: 生成日内交易信号
    depends_on: [technical_analysis, volatility_prediction, intraday_range]
    
  - name: risk_assessment
    tool: tool_assess_risk
    description: 风险评估（需结合情绪快照判断是否进入过热/退潮/混沌）
    depends_on:
      [
        fetch_limit_up_stocks,
        fetch_a_share_fund_flow,
        fetch_northbound_flow,
        fetch_sector_data,
        generate_intraday_signals,
      ]
    
  - name: send_signals
    tool: tool_send_signal_alert
    description: 发送符合条件的交易信号
    depends_on: [risk_assessment]
    condition: "signal_strength >= 'medium'"

structured_message: |
  执行日内分析工作流时，除分钟线、Greeks、波动率和信号外，必须将以下四工具视为同一轮“情绪快照”：
  - `tool_fetch_limit_up_stocks`
  - `tool_fetch_a_share_fund_flow`
  - `tool_fetch_northbound_flow`
  - `tool_fetch_sector_data`

  若运行环境支持 `market-sentinel` 规程，应按其契约将四工具聚合为当轮情绪结论；若不支持直接 Skill 调用，则至少在风险评估与最终信号输出中体现：
  - 当前 `sentiment_stage`
  - `risk_counterevidence`
  - `degraded` / `insufficient_evidence`

  阶段切换检测要求：
  - 优先将本轮结果与最近一次成功的盘前/盘中情绪快照比较，识别 `prev_stage -> curr_stage`。
  - 若检测到 `修复 -> 高潮`、`震荡 -> 混沌`、`高潮 -> 退潮` 等切换，必须在风险评估中增加额外提示。
  - 若当前执行上下文无法可靠获取上一轮快照，须明确写“未获取到上一轮情绪基线，本次仅输出当前快照”，不得伪造切换结论。
