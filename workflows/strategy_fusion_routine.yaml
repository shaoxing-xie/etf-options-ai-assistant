# 策略引擎与信号融合 — OpenClaw / Agent 步骤模板
# 与 agents/analysis_agent.yaml 中 strategy_fusion_task、config/openclaw_strategy_engine.yaml 一致。
# 实际 Cron 绑定以 cron/jobs.json 为准；示例见 CRON_JOBS_EXAMPLE.json
#
# 注意：optional_risk / optional_notify 无 depends_on，非严格 DAG；复制到 jobs 时请按需补依赖或删未用步。
#
# 返回 data 要点：candidates、fused（主标的）、fused_by_symbol（多 ETF）、summary（聚合摘要）、
# weights_effective、inputs_hash、policy_applied。下游自动化可优先读 data.summary 再按需展开 fused_by_symbol。

name: strategy_fusion_routine
description: 定时或按需运行 tool_strategy_engine，可选后续风控与通知

steps:
  - name: fuse
    tool: tool_strategy_engine
    params:
      underlying: "510300"
      index_code: "000300"
      mode: "production"
      use_dynamic_weights: true
      write_journal: true
      # sources 为空时按 strategy_fusion.yaml.providers 默认启用；
      # 可显式传入以动态控制来源（包含 internal_chart_alert）
      # sources: ["src_signal_generation", "etf_trend_following", "internal_chart_alert"]
      # 多 ETF 示例（与 index_code 同序；复制为实际 params 时去掉 # 并改为字符串）:
      # underlying: "510300,510500"
      # index_code: "000300,000905"

  - name: optional_risk
    tool: tool_assess_risk
    note: 若 data.fused（或关注的标的在 fused_by_symbol）非 neutral 且需要下单前校验时再调用；参数按业务填写

  - name: optional_notify
    tool: tool_send_signal_alert
    note: 可将 data.summary 与 data.fused 摘要写入通知；多标的时注明 fused_by_symbol 或主标的；勿泄露敏感账户信息
