name: strategy_calibration
description: 周度策略定调（情绪四工具 + 输出 regime/pause 口径供夜盘选股消费）

schedule: "30 8 * * 1"
timezone: "Asia/Shanghai"

steps:
  - name: check_trading_status
    agent: data_collector_agent
    tool: tool_check_trading_status
    description: A股时段门禁
    params: {}
    continue_on_failure: true

  - name: fetch_limit_up_stocks
    agent: data_collector_agent
    tool: tool_fetch_limit_up_stocks
    description: 涨停生态（定调上下文）
    params: {}
    continue_on_failure: true
    depends_on: [check_trading_status]

  - name: fetch_a_share_fund_flow
    agent: data_collector_agent
    tool: tool_fetch_a_share_fund_flow
    description: 大盘资金历史窗口
    params:
      query_kind: "market_history"
      max_days: 5
    continue_on_failure: true
    depends_on: [check_trading_status]

  - name: fetch_northbound_flow
    agent: data_collector_agent
    tool: tool_fetch_northbound_flow
    description: 北向资金态度
    params:
      lookback_days: 5
    continue_on_failure: true
    depends_on: [check_trading_status]

  - name: fetch_sector_data
    agent: data_collector_agent
    tool: tool_fetch_sector_data
    description: 行业板块结构
    params:
      sector_type: "industry"
      period: "today"
    continue_on_failure: true
    depends_on: [check_trading_status]

  - name: send_calibration_notice
    agent: notification_agent
    tool: tool_send_dingtalk_message
    description: 发送周度定调提示（含 pause 规则说明）
    depends_on:
      [
        fetch_limit_up_stocks,
        fetch_a_share_fund_flow,
        fetch_northbound_flow,
        fetch_sector_data,
      ]
    params:
      title: "周度策略定调（震荡选股门禁）"
      message: |
        [strategy_calibration]
        已采集四路情绪上下文。请 Agent 聚合 `sentiment_stage` 与 `sentiment_dispersion`（或等价分歧度），
        若「冰点/高潮」且分歧度 > 30（阈值可配置），定调输出 `regime: pause`，夜盘 `nightly_stock_screening` 应跳过新观察池写入。

        涨停：{{fetch_limit_up_stocks.explanation}}
        A股资金：{{fetch_a_share_fund_flow.explanation}}
        北向：{{fetch_northbound_flow.data.total_net}}
        板块：{{fetch_sector_data.explanation.main_line_reason}}
      mode: "prod"

structured_message: |
  执行「周度策略定调」。与 `pre_market_sentiment_check` 同构四工具；产出写入会话或 sidecar JSON（如 `config/weekly_calibration.json`）由 Agent 完成，
  但必须显式给出 `regime`：`trend` | `oscillation` | `pause`，供夜盘 screening 读取。
