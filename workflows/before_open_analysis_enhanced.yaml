# 增强版盘前分析工作流
# 执行时间：工作日 9:20
# 功能：完整的盘前分析流程，包括数据采集、趋势分析、波动率预测、日内区间预测和通知
# 支持：定时执行 + 手动触发

name: before_open_analysis_enhanced
description: 增强版盘前分析工作流，包含6步完整流程，支持定时执行和手动触发

# Cron配置（用于定时执行）
schedule: "20 9 * * 1-5"  # 工作日 9:20（Cron格式：分钟 小时 日 月 星期）
timezone: "Asia/Shanghai"

# 工作流步骤说明（用于生成结构化消息）
steps:
  - name: fetch_index_opening
    agent: data_collector_agent
    tool: tool_fetch_index_opening
    description: 获取指数开盘数据
    params: {}
    continue_on_failure: true

  - name: fetch_global_index_spot
    agent: data_collector_agent
    tool: tool_fetch_global_index_spot
    description: 获取全球指数数据（美股、港股等）
    params: {}
    continue_on_failure: true

  - name: analyze_before_open
    agent: analysis_agent
    tool: tool_analyze_before_open
    description: 进行盘前趋势分析，预测当日市场走势
    params: {}
    depends_on: [fetch_index_opening, fetch_global_index_spot]

  - name: predict_volatility
    agent: analysis_agent
    tool: tool_predict_volatility
    description: 预测当日波动率区间
    params:
      underlying: "510300"
    depends_on: [analyze_before_open]

  - name: predict_intraday_range
    agent: analysis_agent
    tool: tool_predict_intraday_range
    description: 预测日内波动区间
    params:
      symbol: "510300"
    depends_on: [predict_volatility]

  - name: send_daily_report
    agent: notification_agent
    tool: tool_send_analysis_report
    description: 发送盘前分析报告到钉钉群
    params:
      report_type: "before_open"
      # report_data将从analyze_before_open、predict_volatility、predict_intraday_range步骤的输出中获取
    depends_on: [analyze_before_open, predict_volatility, predict_intraday_range]

# 结构化消息模板（用于OpenClaw cron任务）
structured_message: |
  执行盘前完整分析流程。请按以下步骤顺序执行：
  
  步骤1：使用 data_collector_agent 的 tool_fetch_index_opening 工具获取指数开盘数据。如果失败，继续执行下一步。
  
  步骤2：使用 data_collector_agent 的 tool_fetch_global_index_spot 工具获取全球指数数据（美股、港股等）。如果失败，继续执行下一步。
  
  步骤3：使用 tool_analyze_before_open 工具进行盘前趋势分析，预测当日市场走势。
  
  步骤4：使用 tool_predict_volatility 工具预测当日波动率区间，参数：underlying="510300"。
  
  步骤5：使用 tool_predict_intraday_range 工具预测日内波动区间，参数：symbol="510300"。
  
  步骤6：使用 notification_agent 的 tool_send_analysis_report 工具发送盘前分析报告到钉钉群。请使用步骤3、4、5的分析结果构建report_data，参数：report_type="before_open"。
