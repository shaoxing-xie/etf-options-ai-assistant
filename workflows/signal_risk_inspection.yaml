# 信号+风控巡检 — 宽基 ETF 30 分钟快报（OpenClaw cron 契约）
# 三个定时任务仍对应 morning | midday | afternoon，仅 phase 不同；Cron 推荐单次进程内工具，避免多轮 tool 链与 Gateway idle 超时。

name: signal_risk_inspection
description: 信号+风控巡检快报（research.md 第十节 + 固定模板 + 钉钉）
timezone: "Asia/Shanghai"

# 以下三段供 jobs 分别引用；正文契约一致，仅 phase 取值不同。
structured_message_morning: |
  执行宽基 ETF 巡检快报（早盘）。**Cron 硬推荐（单次调用）**：`tool_run_signal_risk_inspection_and_send(phase='morning', mode='prod')`。进程内拉取 000300/399006/000905、510300/510500/159915 实时与 `tool_portfolio_risk_snapshot`，组装 report 后由 `tool_send_signal_risk_inspection` 渲染并发钉钉；不经主模型传递大 JSON。

  【手工/排障】若需自行填字段：仍须先调 `tool_portfolio_risk_snapshot`，再 `tool_send_signal_risk_inspection(report=..., phase='morning', mode='prod')`。`report` 键清单见仓库 `plugins/notification/send_signal_risk_inspection.py` 中 `_REQUIRED_REPORT_KEYS`。

  【硬约束】禁止直接手写最终群消息正文（除非走上述发送工具）。仅允许指数 000300/399006/000905 与 ETF 510300/510500/159915；禁止个股、涨停回马枪专章、长 Market Regime。禁止无关 web_search/docker 等依赖。

  【宏观旁路】若时间允许，先只读调用 `tool_fetch_macro_snapshot`（china-macro-analyst 口径），将一行摘要写入 `report.macro_note`（可空）；不得替代上述硬约束标的范围。

  【钉钉】`docs/openclaw/dingtalk_delivery_contract.md` §巡检快报；`delivery.mode=none`；终稿末行 `INSPECTION_RUN_STATUS:`。

  【最终回复】成功时简短说明工具回执即可，勿重复粘贴全文模板。

structured_message_midday: |
  执行宽基 ETF 巡检快报（上午）。**Cron 硬推荐（单次调用）**：`tool_run_signal_risk_inspection_and_send(phase='midday', mode='prod')`。进程内采集与发送同早盘说明；`phase` 须为 `midday`。

  【手工/排障】`tool_send_signal_risk_inspection(report=..., phase='midday', mode='prod')`；键清单见 `_REQUIRED_REPORT_KEYS`。

  【硬约束】同 structured_message_morning。

  【宏观旁路】同 structured_message_morning。

  【钉钉】同 structured_message_morning。

  【最终回复】同 structured_message_morning。

structured_message_afternoon: |
  执行宽基 ETF 巡检快报（下午/尾盘）。**Cron 硬推荐（单次调用）**：`tool_run_signal_risk_inspection_and_send(phase='afternoon', mode='prod')`。进程内采集与发送同早盘说明；`phase` 须为 `afternoon`。

  【手工/排障】`tool_send_signal_risk_inspection(report=..., phase='afternoon', mode='prod')`；键清单见 `_REQUIRED_REPORT_KEYS`。

  【硬约束】同 structured_message_morning。

  【宏观旁路】同 structured_message_morning。

  【钉钉】同 structured_message_morning。

  【最终回复】同 structured_message_morning。
