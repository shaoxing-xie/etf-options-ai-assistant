name: quality_backstop_audit
description: 混合模式中的定时兜底巡检（覆盖 Cron、工具BUG、预测漂移、运维问题）
schedule:
  cron: "30 20 * * 1-5"
  timezone: "Asia/Shanghai"

meta:
  phase: "2-5"
  trigger_mode: scheduled_backstop
  entry_agent: etf_main
  reviewer_agent: etf_analysis_agent
  evolver: capability-evolver

structured_message: |
  执行质量兜底巡检（定时）：
  - 巡检 Cron/任务异常（最近一次执行状态、失败步骤、失败码一致性）。
  - 巡检工具运行时 BUG（按环境/参数/代码缺陷三级分流）。
  - 巡检预测准确性漂移（按既定窗口评估，超阈值触发 issue/告警建议）；核对 prediction_records 与
    `scripts/verify_predictions.py` / `workflows/prediction_verification.yaml` 是否可引用 RAW，防止「仅聊天宣称已验证」。
  - 巡检运维问题（发现-诊断-处置-验证链路完整性）。
  输出必须包含以下结构化字段（逐行）：
  - TEAM_RESULT=TEAM_OK|TEAM_FAIL
  - FAILURE_CODES=<逗号分隔；无则 NONE>
  - ROOT_CAUSE=<一句话；未知则 UNKNOWN_CAUSE>
  - RISK=LOW|MEDIUM|HIGH
  - AUTOFIX_ALLOWED=true|false
  - EVIDENCE_REF=<至少1个 runId/jobId/日志路径>
  - TOP_ACTIONS=<最多3条，分号分隔>

  自动修复准入（硬约束）：
  - 仅当 TEAM_RESULT=TEAM_OK 且 RISK=LOW 且 AUTOFIX_ALLOWED=true 时，才允许进入修复动作。
  - MEDIUM/HIGH 风险只允许给修复建议，不得自动改动代码。
  - 自动修复仅允许使用 github 能力发起 PR（exec + gh / github skill），禁止直接 merge 到 main。
  - 无 RAW 证据不得给 TEAM_OK；证据不足必须使用 NO_EVIDENCE / UNKNOWN_CAUSE 失败码。

  通知幂等与渠道判定（硬约束）：
  - 单次巡检运行（同一 runId / sessionId）最多只允许调用 1 次 `tool_send_dingtalk_message`。
  - 若首次投递已返回成功（如 errcode=0 / success=true），后续同一运行内严禁再次投递同内容或改写后重复投递。
  - `WRONG_NOTIFICATION_CHANNEL` 仅用于“任务规范要求钉钉但实际发飞书”的场景。
  - 对任务规范中明确要求飞书的作业（例如 `jobId=9d8e5b7d-f7b1-4116-ac02-055598a74781`），不得判为 `WRONG_NOTIFICATION_CHANNEL`。

