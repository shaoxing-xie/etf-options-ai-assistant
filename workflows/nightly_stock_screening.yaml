name: nightly_stock_screening
description: 盘后多因子选股（tool_screen_equity_factors）并提示落盘观察池

schedule: "0 20 * * 1-5"
timezone: "Asia/Shanghai"

steps:
  - name: check_trading_status
    agent: data_collector_agent
    tool: tool_check_trading_status
    description: 非交易日跳过后续（由 Agent 判断 trading_day）
    params: {}
    continue_on_failure: true

  - name: screen_hs300
    agent: data_collector_agent
    tool: tool_screen_equity_factors
    description: 沪深300成分内震荡模板选股（可改 universe）
    depends_on: [check_trading_status]
    params:
      universe: "hs300"
      regime_hint: "oscillation"
      top_n: 15
      max_universe_size: 50
      factors: ["reversal_5d", "fund_flow_3d", "sector_momentum_5d"]
      neutralize: []
    continue_on_failure: true

  - name: send_screening_summary
    agent: notification_agent
    tool: tool_send_dingtalk_message
    description: 推送选股摘要（含 quality_score / degraded / config_hash / 收尾指引）
    depends_on: [screen_hs300]
    params:
      title: "夜盘选股 screening"
      message: |
        [nightly_stock_screening]
        插件返回：success={{screen_hs300.success}} quality={{screen_hs300.quality_score}} degraded={{screen_hs300.degraded}} hash={{screen_hs300.config_hash}}
        【收尾】在同一会话内对完整 JSON 调用 `tool_finalize_screening_nightly(screening_result=<上一步完整返回>)`，将写入 `data/screening/YYYY-MM-DD.json` 并按 `config/data_quality_policy.yaml` screening 节与熔断标志合并观察池。
        Cron 无 Agent 时可用：`PYTHONPATH=. python3 scripts/nightly_screening_and_persist.py`。
        若 `regime=pause` 或 `emergency_pause.json` 有效，收尾工具会跳过观察池写入但仍落盘审计。
      mode: "prod"

structured_message: |
  盘后顺序：`tool_screen_equity_factors` → `tool_finalize_screening_nightly`（门禁见 `src/screening_quality_gate.py` + `tool_payload_quality`）。
  定调 pause 见 `config/weekly_calibration.json`；紧急熔断见 `screening_emergency_stop.yaml`。
