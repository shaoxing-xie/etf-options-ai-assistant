version: 1

# When calling `tool_calculate_technical_indicators`, prefer an explicit list covering
# trend + momentum + volatility buckets (see references/indicator_signal_guide.md).
default_indicator_strategy: bundle_trend_momentum_volatility

thresholds:
  rsi:
    oversold: 30
    overbought: 70
  kdj:
    oversold: 20
    overbought: 80
  cci:
    oversold: -100
    overbought: 100
  adx:
    weak_trend: 20
    strong_trend: 25

scoring:
  trend_weight: 0.4
  momentum_weight: 0.3
  volatility_weight: 0.3

output_policy:
  require_counterevidence: true
  allow_execution_instruction: false

