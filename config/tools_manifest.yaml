# 工具清单 — 与 Gateway 扩展 option-trading-assistant 对齐。
# 行情/参考数据 tool_* 由插件 openclaw-data-china-stock 注册；本仓库 plugins/data_collection 链向 ~/.openclaw/extensions/openclaw-data-china-stock/plugins/data_collection。
# 修改后请运行: python3 scripts/generate_tools_json.py

tools:
- id: tool_internal_alert_scan
  label: 内部图表告警扫描
  description: 扫描配置的内部量价/技术告警规则，输出 events 列表。
  description_short: 内部告警扫描
  parameters:
    type: object
    properties:
      symbols:
        type: string
        description: 可选，逗号分隔标的代码；空则使用默认列表
- id: tool_fetch_global_index_spot
  label: 获取全球指数实时数据
  description: 获取全球主要指数实时行情（道琼斯、纳斯达克、标普500等）。
  description_short: 获取全球主要指数实时行情（道琼斯、纳斯达克、标普500等）。
  parameters:
    type: object
    properties: {}
- id: tool_fetch_global_index_hist_sina
  label: 全球指数历史日线（收盘口径）
  description: >-
    全球指数历史日线（新浪/AkShare）。用于“上一完整交易日收盘”口径（昨收/上周五收市等）与补齐 spot 缺口；
    典型：^GDAXI/^FTSE/^STOXX50E 等欧股代表。返回 data 为日线 rows（date/open/high/low/close/volume）。
  description_short: 全球指数历史日线（昨收/收市口径）
  parameters:
    type: object
    properties:
      symbol:
        type: string
        description: 指数名称/代码，或部分 yfinance 符号（如 ^GDAXI/^FTSE/^STOXX50E）
      limit:
        type: integer
        description: 返回最近 N 条（用于计算昨收涨跌时常用 2）
        default: 2
    required:
    - symbol
- id: tool_trading_copilot
  label: 交易助手统一入口
  description: 统一入口：交易状态→A股时段→快扫→(条件触发)信号→持仓检查，输出低上下文摘要。
  description_short: 统一入口：交易状态→A股时段→快扫→(条件触发)信号→持仓检查，输出…
  parameters:
    type: object
    properties:
      focus_etfs:
        type: string
        description: ETF关注列表（逗号分隔），为空使用默认核心池
      focus_stocks:
        type: string
        description: A股关注列表（逗号分隔，可选）
      mode:
        type: string
        description: light|normal|deep
        default: normal
      run_signal:
        type: boolean
        description: 是否强制运行信号重流程（可选）
      signal_etf:
        type: string
        description: 指定跑信号的 ETF（可选）
      throttle_minutes:
        type: number
        description: 信号重流程节流分钟数
        default: 5
      timezone:
        type: string
        description: 时区
        default: Asia/Shanghai
      disable_network_fetch:
        type: boolean
        description: 禁用外部联网行情抓取
        default: false
      output_format:
        type: string
        description: feishu_card|json
        default: feishu_card
      include_snapshot:
        type: boolean
        description: 是否在返回中包含原始快照数据
        default: false
      send_feishu_card:
        type: boolean
        description: 是否发送飞书交互卡片
        default: false
      feishu_webhook_url:
        type: string
        description: 可选覆盖 notification.feishu_webhook
- id: tool_event_sentinel
  label: 事件哨兵
  description: 外部事件/政策/公告检索与摘要，输出对宽基ETF/A股影响提示。
  description_short: 外部事件/政策/公告检索与摘要，输出对宽基ETF/A股影响提示。
  parameters:
    type: object
    properties:
      query:
        type: string
        description: 事件关键词或一句话描述
      topic:
        type: string
        description: general|news
        default: news
      n:
        type: number
        description: sources 数量
        default: 5
      days:
        type: number
        description: news 回溯天数
        default: 3
      deep:
        type: boolean
        description: 是否深搜
        default: false
      disable_network_fetch:
        type: boolean
        description: 禁用联网（受限环境降级）
        default: false
    required:
    - query
- id: tool_send_feishu_card_webhook
  label: 发送飞书交互卡片（Webhook）
  description: 通过飞书 bot webhook 发送 interactive 卡片。
  description_short: 通过飞书 bot webhook 发送 interactive 卡片。
  parameters:
    type: object
    properties:
      card:
        type: string
        description: 卡片 payload（JSON 字符串或对象）
      webhook_url:
        type: string
        description: 可选覆盖 notification.feishu_webhook
      timeout_seconds:
        type: number
        description: HTTP 超时秒数
        default: 10
    required:
    - card
- id: tool_calculate_technical_indicators
  label: 计算技术指标
  description: "计算MA、MACD、RSI、布林带等指标；默认 engine=standard（pandas_ta，Wilder RSI 等）。可选 kdj/cci/adx/atr（仅 standard）。legacy 与历史 Coze 数值一致。"
  description_short: 计算技术指标（pandas_ta / 可选 legacy）
  parameters:
    type: object
    properties:
      symbol:
        type: string
        description: 标的代码
        default: '510300'
      data_type:
        type: string
        description: 数据类型
        default: etf_daily
      period:
        type: string
        description: 周期（分钟数据）
      lookback_days:
        type: number
        description: 回溯自然日（日线用；分钟线内部会放大窗口）
        default: 120
      engine:
        type: string
        description: "standard（默认，pandas_ta）或 legacy（原列表实现，数值与旧版一致）"
        enum:
          - standard
          - legacy
      indicators:
        type: array
        description: "指标列表，如 ma、macd、rsi、bollinger、kdj、cci、adx、atr；默认见合并后配置 technical_indicators.default_indicators（来源：config/domains/analytics.yaml）；亦兼容 MA10/RSI14 写法（与 ma_periods/rsi_length 二选一）"
      timeframe_minutes:
        type: number
        description: "分钟 K 重采样周期（>=2 时生效），如 5m 源数据聚合为 30m 后再计算"
      ma_periods:
        type: array
        description: "单次调用覆盖均线周期，如 [10,20]；与 intraday_monitor 的 30m MA 口径对齐"
      rsi_length:
        type: number
        description: "单次调用覆盖 RSI 周期，默认见 config"
- id: tool_analyze_after_close
  label: 盘后趋势分析
  description: 执行盘后趋势分析（15:30执行）。
  description_short: 执行盘后趋势分析（15:30执行）。
  parameters:
    type: object
    properties: {}
- id: tool_analyze_before_open
  label: 开盘前趋势分析
  description: 执行开盘前趋势分析（9:15执行）。
  description_short: 执行开盘前趋势分析（9:15执行）。
  parameters:
    type: object
    properties: {}
- id: tool_analyze_opening_market
  label: 开盘行情分析
  description: 执行开盘行情分析（9:28执行）。
  description_short: 执行开盘行情分析（9:28执行）。
  parameters:
    type: object
    properties: {}
- id: tool_compute_index_key_levels
  label: 指数关键位（支撑压力）
  description: 基于最近日线计算指数近似支撑/压力位（MA20、近窗高低、整数关口）；供盘前/开盘报告展示。
  description_short: 沪深300 等指数关键位简算
  parameters:
    type: object
    properties:
      index_code:
        type: string
        description: 指数代码，如 000300（沪深300）
        default: '000300'
      lookback_days:
        type: number
        description: 回溯自然日样本长度
        default: 120
- id: tool_get_yesterday_prediction_review
  label: 昨日预测粗检
  description: 读取上一交易日 prediction_records，可选与现价对比是否落入预测区间。
  description_short: 昨日盘前/波动预测记录回顾
  parameters:
    type: object
    properties:
      underlying_close:
        type: number
        description: 可选；若提供则与记录中的 intraday_range 上下界对比
- id: tool_record_before_open_prediction
  label: 盘前预测落盘
  description: 将盘前报告中的波动/区间等预测写入 data/prediction_records/{date}.json，供次日回顾。
  description_short: 写入 prediction_records
  parameters:
    type: object
    properties:
      report_data:
        type: object
        description: 报告数据对象（含 report_type、volatility、intraday_range 等）
      trade_date:
        type: string
        description: 可选，交易日 YYYYMMDD；默认上海当日
    required:
    - report_data
- id: tool_predict_volatility
  label: 波动率预测
  description: 使用GARCH/ARIMA模型预测波动率。
  description_short: 使用GARCH/ARIMA模型预测波动率。
  parameters:
    type: object
    properties:
      underlying:
        type: string
        description: "标的物代码或简称；歧义时用 指数:/ETF:/股票: 前缀"
        default: '510300'
      contract_codes:
        type: array
        description: 期权合约代码列表
      asset_type_hint:
        type: string
        description: 可选 index / etf / stock，与 underlying 联用消歧
- id: tool_calculate_historical_volatility
  label: 计算历史波动率
  description: 单窗口日线已实现波动率（年化%，与 sqrt(252) 口径一致）。多窗口/波动率锥/IV 请用 tool_underlying_historical_snapshot。
  description_short: 单窗口历史波动率（年化%）
  parameters:
    type: object
    properties:
      symbol:
        type: string
        description: 标的代码
      data_type:
        type: string
        description: 数据类型
      lookback_days:
        type: number
        description: 回溯交易日样本长度（默认与插件实现一致，见 historical_snapshot 或代码默认）
        default: 60
    required:
    - symbol
- id: tool_underlying_historical_snapshot
  label: 标的历史波动快照
  description: 多标的、多窗口年化 HV、可选波动率锥、可选 SSE ETF 近月 ATM IV（含 iv_eq_30d）。股票/ETF/指数日线；默认配置见合并后配置 `historical_snapshot`（来源：config/domains/analytics.yaml）。
  description_short: 多窗口 HV 与可选 IV 快照
  parameters:
    type: object
    properties:
      symbols:
        type: string
        description: 标的列表，逗号/空格/分号分隔（如 510300,000300）
      windows:
        type: array
        description: 窗口天数列表，缺省用 config historical_snapshot.default_windows
        items:
          type: number
      include_vol_cone:
        type: boolean
        description: 是否计算波动率锥（min/max/mean/percentile）
      include_iv:
        type: boolean
        description: 是否拉取近月 ATM IV（仅上交所 ETF 期权标的有效）
      max_symbols:
        type: number
        description: 单次最多标的数
      start_date:
        type: string
        description: 起始 YYYYMMDD（可选）
      end_date:
        type: string
        description: 结束 YYYYMMDD（可选）
      asset_type:
        type: string
        description: auto|stock|etf|index；个股建议 stock
        default: auto
    required:
    - symbols
- id: tool_historical_snapshot
  label: 标的历史波动快照（别名）
  description: 与 tool_underlying_historical_snapshot 等价。
  description_short: 同 tool_underlying_historical_snapshot
  parameters:
    type: object
    properties:
      symbols:
        type: string
        description: 标的列表，逗号/空格/分号分隔
      windows:
        type: array
        items:
          type: number
      include_vol_cone:
        type: boolean
      include_iv:
        type: boolean
      max_symbols:
        type: number
      start_date:
        type: string
      end_date:
        type: string
      asset_type:
        type: string
        default: auto
    required:
    - symbols
- id: tool_generate_signals
  label: 生成交易信号（兼容别名）
  description: 期权交易信号；与 tool_generate_option_trading_signals 等价。
  description_short: 期权信号（别名）
  parameters:
    type: object
    properties:
      underlying:
        type: string
        description: 标的物代码
        default: '510300'
      contract_codes:
        type: array
        description: 期权合约代码列表
- id: tool_generate_option_trading_signals
  label: 生成期权交易信号
  description: 按配置关联指数与合约生成期权信号；data.asset_class=option。
  description_short: 期权交易信号
  parameters:
    type: object
    properties:
      underlying:
        type: string
        description: ETF 标的代码
        default: '510300'
      mode:
        type: string
        default: production
- id: tool_generate_etf_trading_signals
  label: 生成 ETF 交易信号
  description: 基于 signal_generation.etf 与短波段规则。
  description_short: ETF 交易信号
  parameters:
    type: object
    properties:
      etf_symbol:
        type: string
        description: ETF 代码，空则默认
      mode:
        type: string
        default: production
- id: tool_generate_stock_trading_signals
  label: 生成 A 股交易信号
  description: 基于 signal_generation.stock 与量价规则（非投资建议）。
  description_short: A 股监控信号
  parameters:
    type: object
    properties:
      symbol:
        type: string
        description: 6 位代码，空则默认
      mode:
        type: string
        default: production
- id: tool_assess_risk
  label: 风险评估
  description: 评估 ETF/指数/A 股持仓风险与仓位建议（凯利简化版）；波动率与 historical_volatility 同口径；显式 asset_type 时缓存优先，无缓存则拉日线。
  description_short: ETF/指数/A 股风险评估（凯利）。
  parameters:
    type: object
    properties:
      symbol:
        type: string
        description: 标的 6 位代码或 sh600000 / 600000.SH
        default: '510300'
      asset_type:
        type: string
        description: auto | stock | etf | index；缺省读 config risk_assessment.default_asset_type
        default: auto
      lookback_trading_days:
        type: integer
        description: 波动率窗口（交易日）；缺省读 config
        default: 60
      entry_price:
        type: number
        description: 入场价格
      position_size:
        type: number
        description: 仓位大小
      account_value:
        type: number
        description: 账户价值
      stop_loss:
        type: number
        description: 止损价（可选；不传则按年化波动率与 config stop_loss_multiplier 估算）
    required:
    - symbol
    - entry_price
    - position_size
    - account_value
- id: tool_predict_intraday_range
  label: 预测日内波动区间
  description: 预测日内价格波动区间。
  description_short: 预测日内价格波动区间。
  parameters:
    type: object
    properties:
      underlying:
        type: string
        description: "标的物代码或简称；歧义时用 指数:/ETF:/股票: 前缀"
        default: '510300'
      asset_type:
        type: string
        description: 可选 index / etf / stock，与 underlying 联用消歧
- id: tool_predict_daily_volatility_range
  label: 日频波动区间预测（全日）
  description: 基于日K多窗口HV与ATR估计完整交易日的价格运行区间；交易时段可做有界纠偏。与 tool_predict_volatility（日内剩余时段）勿混用。
  description_short: 日频全日波动区间（HV多窗+ATR）。
  parameters:
    type: object
    properties:
      underlying:
        type: string
        description: "标的物代码或简称；歧义时用 指数:/ETF:/股票: 前缀"
        default: '510300'
      asset_type:
        type: string
        description: 可选 index / etf / stock，与 underlying 联用消歧
- id: tool_check_etf_index_consistency
  label: 检查ETF与指数趋势一致性
  description: 检查ETF与其跟踪指数的趋势一致性，计算相关性和一致性得分。
  description_short: 检查ETF与其跟踪指数的趋势一致性，计算相关性和一致性得分。
  parameters:
    type: object
    properties:
      etf_symbol:
        type: string
        description: ETF代码
        default: '510300'
      index_code:
        type: string
        description: 指数代码
        default: '000300'
      lookback_days:
        type: number
        description: 回看天数
        default: 60
- id: tool_generate_trend_following_signal
  label: 生成趋势跟踪信号
  description: 基于ETF与指数趋势一致性生成趋势跟踪交易信号。
  description_short: 基于ETF与指数趋势一致性生成趋势跟踪交易信号。
  parameters:
    type: object
    properties:
      etf_symbol:
        type: string
        description: ETF代码
        default: '510300'
      index_code:
        type: string
        description: 指数代码
        default: '000300'
      min_trend_strength:
        type: number
        description: 最小趋势强度
        default: 0.6
      min_consistency_score:
        type: number
        description: 最小一致性得分
        default: 0.7
- id: tool_strategy_engine
  label: 策略引擎与信号融合
  description: '【何时优先调用】用户问「多路信号是否一致」「综合偏多/偏空」「合成交易观点」「纪律化融合」、或需在单路 tool_generate_option_trading_signals（别名 tool_generate_signals）
    之外要统一审计视图时，应调用本工具。

    聚合多路 Rule 信号（src 期权信号生成 + ETF 趋势等），按 config/strategy_fusion.yaml 与动态/落盘权重融合，返回 data.candidates、data.fused、data.fused_by_symbol（多标的）、data.summary、data.weights_effective、data.inputs_hash（含
    policy_version、fusion_policy、strategy_weights_yaml 等快照）；可选写 Journal（strategy_fusion）。

    不替代 tool_generate_option_trading_signals / tool_generate_etf_trading_signals / tool_generate_stock_trading_signals；单路明细仍可用各信号工具。进化闭环见 config/openclaw_strategy_engine.yaml（persist_effective_weights
    + 周期性 tool_adjust_strategy_weights）。

    '
  description_short: 多策略加权融合；综合信号/一致性场景优先
  parameters:
    type: object
    properties:
      underlying:
        type: string
        description: ETF 标的代码；多标的组合用英文逗号分隔，如 510300,510500
        default: '510300'
      index_code:
        type: string
        description: 指数代码（趋势策略）；单个则复用于所有标的，或与 underlying 同序逗号列表，如 000300,000905
        default: '000300'
      mode:
        type: string
        description: 传给 src 信号生成的模式
        default: production
      use_dynamic_weights:
        type: boolean
        description: 是否合并动态权重（优先 data/strategy_fusion_effective_weights.json，其次 get_strategy_weights）
        default: true
      write_journal:
        type: boolean
        description: 是否追加 strategy_fusion 事件到 Journal
        default: true
      config_path:
        type: string
        description: 自定义 strategy_fusion.yaml 路径（可选）
- id: tool_calculate_position_size
  label: 计算建议仓位（含硬锁定）
  description: 根据趋势强度和信号置信度计算建议仓位，支持2%硬锁定限制。
  description_short: 根据趋势强度和信号置信度计算建议仓位，支持2%硬锁定限制。
  parameters:
    type: object
    properties:
      trend_strength:
        type: number
        description: 趋势强度 (0-1)
        default: 0.7
      signal_confidence:
        type: number
        description: 信号置信度 (0-1)
        default: 0.8
      account_value:
        type: number
        description: 账户总值
        default: 100000
      etf_current_price:
        type: number
        description: ETF当前价格
        default: 4.0
      apply_hard_limit:
        type: boolean
        description: 是否应用硬锁定
        default: true
      hard_limit_pct:
        type: number
        description: 硬锁定百分比
        default: 0.02
    required:
    - trend_strength
    - signal_confidence
- id: tool_check_position_limit
  label: 检查仓位是否超限
  description: 检查当前仓位是否超过硬锁定限制（2%）。
  description_short: 检查当前仓位是否超过硬锁定限制（2%）。
  parameters:
    type: object
    properties:
      current_position_value:
        type: number
        description: 当前仓位价值
      account_value:
        type: number
        description: 账户总值
        default: 100000
      hard_limit_pct:
        type: number
        description: 硬锁定百分比
        default: 0.02
    required:
    - current_position_value
    - account_value
- id: tool_apply_hard_limit
  label: 应用硬锁定限制
