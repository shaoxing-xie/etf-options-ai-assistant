      title:
        type: string
        description: 消息标题
      webhook_url:
        type: string
        description: 可选：自定义机器人 webhook（包含 access_token）
      secret:
        type: string
        description: 可选：安全模式 SEC 密钥（用于 sign）
      keyword:
        type: string
        description: 可选：关键词安全校验用（如果机器人启用关键词）
      mode:
        type: string
        description: prod|test
        default: prod
      split_markdown_sections:
        type: boolean
        description: "是否显式按章节分条（超长时仍会合并 ## 节至单条上限）"
