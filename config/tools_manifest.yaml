- id: tool_quantitative_screening
  label: 量化选股
  description: 对候选标的做动量/波动率/流动性/估值因子打分，输出排名与 top_picks。
  description_short: 对候选标的做动量/波动率/流动性/估值因子打分，输出排名与 top_p。
  parameters:
    type: object
    properties:
      candidates:
        type: string
        description: 候选标的，逗号分隔或数组，如 510300,510500
      lookback_days:
        type: number
        description: 回溯天数
        default: 20
      universe:
        type: string
        description: etf|stock|null 自动判断
      top_k:
        type: number
        description: 返回前多少名
        default: 10
    required:
    - candidates
- id: tool_backtest_limit_up_pullback
  label: 涨停回马枪回测
  description: 涨停回马枪策略回测。
  description_short: 涨停回马枪策略回测。
  parameters:
    type: object
    properties:
      start_date:
        type: string
        description: 开始日期
      end_date:
        type: string
        description: 结束日期
      data_dir:
        type: string
        description: 数据目录
      strategies:
        type: array
        description: 策略列表
        items:
          type: string
      sector_score_min:
        type: number
        description: 板块热度最低分
        default: 70
      hold_days:
        type: number
        description: 持仓天数
        default: 5
      stop_loss_below_limit_pct:
        type: number
        description: 止损比例%
        default: 5.0
      target_pct:
        type: number
        description: 目标收益%
        default: 5.0
- id: tool_backtest_limit_up_sensitivity
  label: 涨停回测参数敏感性
  description: 对涨停回马枪关键参数做网格搜索，返回推荐参数。
  description_short: 对涨停回马枪关键参数做网格搜索，返回推荐参数。
  parameters:
    type: object
    properties:
      start_date:
        type: string
      end_date:
        type: string
      data_dir:
        type: string
- id: tool_sector_heat_score
  label: 板块热度评分
  description: 按涨停股聚合行业/板块，结合行业涨跌与净流入计算 0–100 热度分与周期 phase；内部调用 tool_fetch_limit_up_stocks 与 tool_fetch_sector_data。
  description_short: 板块热度评分与周期阶段
  parameters:
    type: object
    properties:
      date:
        type: string
        description: 交易日 YYYYMMDD；省略则按当前日历日
      limit_up_data:
        type: array
        description: 可选，已获取的涨停列表
      sector_data:
        type: object
        description: 可选，行业板块行情
