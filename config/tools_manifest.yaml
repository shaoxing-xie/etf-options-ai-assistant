- id: tool_send_daily_report
  label: 发送市场日报
  description: 发送每日市场分析报告到钉钉自定义机器人（支持 SEC 加签）。
  description_short: 发送市场日报到钉钉（SEC 加签）。
  parameters:
    type: object
    properties:
      report_data:
        type: object
        description: >-
          必填。默认「市场日报」须将当轮 tool_analyze_after_close 的完整工具返回（含 success、message、data）
          原样写入 report_data.tool_analyze_after_close，并把其 data 写入 report_data.analysis（须为对象，禁止
          「盘后分析完成」等短句）；补采工具整段结果挂在同名键（如 tool_fetch_global_index_spot、
          tool_predict_daily_volatility_range）或合并进 daily_report_overlay。禁止省略大块 JSON 以省 token。
      split_markdown_sections:
        type: boolean
        description: "是否按 ##/### 章节合并分条（与每日市场分析报告一致）；省略时默认为 true，显式 false 可关。"
        default: true
      max_chars_per_message:
        type: integer
        description: 单条目标字符上限；省略则读合并后配置 notification.dingtalk_max_chars_per_message（来源：config/domains/outbound.yaml；硬顶 dingtalk_max_chars_hard_ceiling）。
    required:
    - report_data
- id: tool_analyze_after_close_and_send_daily_report
  label: 盘后分析并发送日报（串接）
  description: >-
    进程内先执行 tool_analyze_after_close，再将完整返回并入 report_data 后调用 tool_send_daily_report；
    单次工具调用即可，避免主模型在两次工具之间传递大段 JSON 导致截断。可选 extra_report_data 与结果浅合并（补采字段）。
  description_short: 盘后分析并发送日报（单工具串接）。
  parameters:
    type: object
    properties:
      report_date:
        type: string
        description: 报告日期（可选）
      webhook_url:
        type: string
        description: 可选：钉钉自定义机器人 webhook（含 access_token）
      mode:
        type: string
        description: prod|test
        default: prod
      extra_report_data:
        type: object
        description: >-
          可选；与 analyze 产物浅合并到 report_data 顶层。每个 tool_* 键的值须为**完整工具返回 JSON**（含 success/data/items 等）；禁止只传参数字典（如仅 index_codes），否则将跳过合并以免覆盖发送层补采。
      secret:
        type: string
        description: 可选：SEC 加签密钥
      keyword:
        type: string
        description: 可选：关键词安全校验
      split_markdown_sections:
        type: boolean
        description: "是否按 ##/### 章节合并分条（与每日市场分析报告一致）；省略时默认为 true，显式 false 可关。"
        default: true
      max_chars_per_message:
        type: integer
        description: 单条最大字符；省略则用合并后配置 notification.dingtalk_max_chars_per_message（来源：config/domains/outbound.yaml，默认 1600）；硬顶 notification.dingtalk_max_chars_hard_ceiling（默认 20000）
        default: 1600
- id: tool_send_analysis_report
  label: 发送分析报告到钉钉
  description: 发送交易时间分析类/研究类报告到钉钉自定义机器人（支持 SEC 加签）。
  description_short: 发送分析报告到钉钉。
  parameters:
    type: object
    properties:
      report_data:
        type: object
        description: 报告数据
      report_date:
        type: string
        description: 报告日期（可选）
      webhook_url:
        type: string
        description: 可选：自定义机器人 webhook（包含 access_token）
      secret:
        type: string
        description: 可选：安全模式 SEC 密钥（用于 sign）
      keyword:
        type: string
        description: 可选：关键词安全校验用（如果机器人启用关键词）
      mode:
        type: string
        description: prod|test
        default: prod
      split_markdown_sections:
        type: boolean
        description: "是否按 ##/### 章节合并分条；分析类报告默认 true，显式 false 可关。"
        default: true
      max_chars_per_message:
        type: integer
        description: 单条目标字符上限；省略则用合并后配置 notification.dingtalk_max_chars_per_message（来源：config/domains/outbound.yaml；默认 1600）；硬顶 dingtalk_max_chars_hard_ceiling。
    required:
    - report_data
- id: tool_send_dingtalk_message
  label: 发送钉钉文本消息
  description: 发送到钉钉自定义机器人（支持 SEC 安全模式加签）。
