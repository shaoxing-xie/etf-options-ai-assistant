        description: prod|test（钉钉发送）
        default: prod
      fetch_mode:
        type: string
        description: production|test（指数/ETF 实时采集；test 跳过交易日门禁，仅用于调试）
        default: production
      debug_force_tail_section:
        type: boolean
        description: 仅 test 模式生效；强制展示“尾盘操作建议”模块，便于非交易时段联调。
        default: false
      debug_now:
        type: string
        description: 仅 test 模式生效；覆盖当前时间（格式 YYYY-MM-DD HH:MM[:SS]），用于时间门禁调试。
      webhook_url:
        type: string
        description: 可选：自定义机器人 webhook（包含 access_token）
      secret:
        type: string
        description: 可选：安全模式 SEC 密钥（用于 sign）
      keyword:
        type: string
        description: 可选：关键词安全校验用（如果机器人启用关键词）
