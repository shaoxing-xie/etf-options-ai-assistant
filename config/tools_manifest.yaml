- id: tool_run_signal_risk_inspection_and_send
  label: 巡检采集并发送
  description: 进程内拉取沪深300/创业板/中证500指数与三只宽基ETF实时、组合风险快照，组装标准 report 后渲染并发送钉钉巡检快报（Cron 推荐单次调用）。
