# ETF 轮动研究：因子权重、过滤与标的池（研究级，不构成交易指令）
version: 1

pool:
  # 主榜 pipeline 计分池；与 openclaw-data-china-stock `sector_etf_mapping` 的 RPS 行业宇宙独立配置，勿混用口径。
  primary_scoring_symbol_groups:
    - industry_etf
    - concept_etf
  symbol_groups:
    - industry_etf
    - concept_etf
  merge_sources:
    # 单测与研究场景需要确保 extra_etf_codes 不因默认 30 上限被截断
    max_size: 80
  extra_etf_codes:
    # 初选池：核心板块ETF（你提供的 28 只静态池）
    # 科技成长（6）
    - "512480" # 半导体ETF
    - "515880" # 通信ETF
    - "588080" # 科创50ETF
    - "159915" # 创业板ETF
    - "512760" # 芯片ETF
    - "515050" # 5GETF
    # 新能源/高端制造（6）
    - "159175" # 电池ETF
    - "516160" # 新能源ETF
    - "159866" # 机器人ETF
    - "512710" # 军工龙头ETF
    - "516150" # 稀土ETF嘉实
    - "515790" # 光伏ETF
    # 消费（4）
    - "512010" # 医药ETF
    - "159928" # 消费ETF
    - "512690" # 酒ETF
    - "159905" # 深红利ETF
    # 周期资源（4）
    - "159870" # 化工ETF
    - "512400" # 有色金属ETF
    - "515220" # 煤炭ETF国泰
    - "159880" # 有色ETF
    # 金融（2）
    - "512000" # 券商ETF
    - "512200" # 地产ETF
    # 宽基（4）
    - "510300" # 沪深300ETF
    - "159338" # A500ETF国泰
    - "159361" # A500ETF易方达
    - "512100" # 1000ETF
    # 跨境（2）
    - "513300" # 纳斯达克ETF
    - "513880" # 日经225ETF

features:
  use_correlation: true
  use_ma: true
  use_trend_r2: true
  use_vol_gate: false
  use_mdd_gate: false

factors:
  w_m5: 0.15
  w_m20: 0.30
  w_m60: 0.25
  w_vol: 0.15
  w_mdd: 0.05
  w_trend_r2: 0.10
  w_corr_penalty: 0.20
  w_stability: 0.10
  w_crowding: 0.10

legacy_factors:
  w_m20: 0.45
  w_m60: 0.35
  w_vol: 0.15
  w_mdd: 0.05

filters:
  min_history_days: 70
  correlation_lookback: 252
  correlation_mode: penalize
  correlation_threshold: 0.70
  correlation_pairwise_max: 0.85
  ma_period: 200
  ma_mode: soft
  ma_below_penalty: 0.5
  trend_r2_window: 60
  vol_min: 0.0
  vol_max: 1.0
  vol_gate_mode: off
  vol_soft_penalty: 0.5
  mdd60_threshold: -0.99
  mdd_gate_mode: off
  mdd_soft_penalty: 0.7

crowding:
  enabled: true
  window: 60
  soft_threshold: 0.8
  hard_threshold: 0.95
  penalty_factor: 0.5

degradation:
  industry_min_available: 5
  concept_min_available: 5
  fallback_strategy: reduce_history_days
  # 主评分 ranked_active 为空时，是否回退按 legacy_score 排序；默认关闭（与数据底座收尾默认一致）
  fallback_legacy_ranking: false

paths:
  history_jsonl: "data/etf_rotation_runs.jsonl"
