  etf-signal-risk-inspection-morning: etf_cron_inspection_agent
  etf-signal-risk-inspection-midday: etf_cron_inspection_agent
  etf-signal-risk-inspection-afternoon: etf_cron_inspection_agent

  etf-rotation-research: etf_cron_research_agent
  factor-evolution-weekly: etf_cron_research_agent
  strategy-evolution-weekly: etf_cron_research_agent

  strategy-calibration: etf_cron_research_agent
