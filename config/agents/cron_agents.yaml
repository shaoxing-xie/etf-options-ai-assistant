# Source of truth for cron execution agents and job routing.
# Maintainers should edit this file, then run:
#   python scripts/render_agents_config.py --apply-jobs
#   python scripts/validate_agent_skill_matrix.py

blockedCronAgents:
  - etf_main
  - etf_analysis_agent

managedAgents:
  - id: etf_cron_analysis_agent
    name: etf_cron_analysis_agent
    templateAgentId: etf_analysis_agent
    agentDir: ${OPENCLAW_AGENTS_ROOT:-~/.openclaw/agents}/etf-options-ai-assistant/cron_analysis_agent/agent
    requiredSkills:
      - ota_daily_session_routine
      - ota_trend_analysis_brief
      - ota_notification_soul_routing
      - market-sentinel
      - ota_openclaw_tool_narration
      - ota_volatility_prediction_narration
      - ota_historical_volatility_snapshot
      - ota_risk_assessment_brief
      - ota_technical_indicators_brief
      - ota_market_regime_checklist
      - ota_cache_read_discipline
      - ota_cn_market_data_discipline
      - tavily-search
      - topic-monitor
      - qmd
    requiredTools:
      fs:
        workspaceOnly: false


  - id: etf_cron_inspection_agent
    name: etf_cron_inspection_agent
    templateAgentId: etf_main
    agentDir: ${OPENCLAW_AGENTS_ROOT:-~/.openclaw/agents}/etf-options-ai-assistant/cron_inspection_agent/agent
    requiredSkills:
      - ota_daily_session_routine
      - ota_signal_risk_inspection
      - ota_notification_soul_routing
      - market-sentinel
      - ota_market_regime_checklist
      - ota_volatility_range_brief
      - ota_openclaw_tool_narration
      - ota_signal_watch_narration
      - ota_volatility_prediction_narration
      - ota_historical_volatility_snapshot
      - ota_risk_assessment_brief
      - tavily-search
      - topic-monitor
      - qmd
    requiredTools:
      fs:
        workspaceOnly: false

  - id: etf_cron_research_agent
    name: etf_cron_research_agent
    templateAgentId: etf_analysis_agent
    agentDir: ${OPENCLAW_AGENTS_ROOT:-~/.openclaw/agents}/etf-options-ai-assistant/cron_research_agent/agent
    requiredSkills:
      - ota_etf_rotation_research
      - ota_strategy_research_loop
      - ota_strategy_fusion_playbook
      - ota_equity_factor_screening_brief
      # 与 workflows/backtesting_research_on_demand 对齐：cron 入口须能读到规程（requiredSkills 全量替换模板，不列则丢失）
      - ota_backtesting_integration_brief
      - backtesting-trading-strategies
      - ota_openclaw_tool_narration
      - ota_market_regime_checklist
      - ota_cache_read_discipline
      - ota_cn_market_data_discipline
      - qmd
      - tavily-search
      - topic-monitor
    requiredTools:
      fs:
        workspaceOnly: false

  - id: etf_cron_ops_agent
    name: etf_cron_ops_agent
    templateAgentId: etf_main
    agentDir: ${OPENCLAW_AGENTS_ROOT:-~/.openclaw/agents}/etf-options-ai-assistant/cron_ops_agent/agent
    requiredSkills:
      - ota_notification_soul_routing
      - ota_openclaw_token_discipline
      - ota_llm_model_routing
      - ota_cmec_collaboration
      - ota_openclaw_tool_narration
      - tavily-search
      - qmd
    requiredTools:
      fs:
        workspaceOnly: false

jobAgentMapping:
  pre-market-sentiment-check: etf_cron_analysis_agent
  extreme-sentiment-monitor: etf_cron_inspection_agent
