nikkei_tail_session:
  enabled: true
  etf_code: '513880'
  index_symbol: ^N225
  decision_mode: user_final_decision
  futures_enabled: true
  range_defaults:
    band_core_multiplier: 0.8
    band_safe_multiplier: 1.2
    min_band_pct: 0.35
    max_band_pct: 2.2
    breakout_confirm_minutes: 3
  technical_thresholds:
    ma25_dev_overheat: 5
    rsi_overbought: 70
    rsi_oversold: 30
  streak_thresholds:
    up_days: 5
    down_days: 3
  gate_rules:
    liquidity_guard_gate:
      enabled: true
      trigger:
        min_amount_yuan_lte: 20000000
  option_profiles:
    conservative:
      max_position_pct: 20
      preferred_actions:
        - hold
        - reduce
        - exit_wait
        - buy_light
    neutral:
      max_position_pct: 40
      preferred_actions:
        - hold
        - reduce
        - buy_light
        - buy_split
    aggressive:
      max_position_pct: 60
      preferred_actions:
        - buy_light
        - buy_split
        - hold
        - reduce
  risk_notice_state:
    manager_premium_notice: false
  risk_notice_rules:
    narrow_band_notice:
      when:
        data_quality_in:
          - fresh
      message: 当前区间较窄，适合在区间内执行低吸高抛，避免追涨追跌。
    overbought_notice:
      when:
        rsi14_gte: 70
      message: 技术面处于过热区域，追高胜率与盈亏比可能同时恶化。
    deviation_notice:
      when:
        ma25_dev_pct_gte: 5
      message: 价格相对25日均线乖离偏大，需防范均值回归。
    manager_notice:
      when:
        manager_premium_notice: true
      message: 基金管理人已发布溢价风险提示，当前更应从风险控制而非追涨逻辑出发。
    degraded_data_notice:
      when:
        data_quality_in:
          - partial
          - stale
          - degraded
      message: 当前部分数据源存在缺口或时滞，系统建议仅作参考，不宜据此激进决策。
nasdaq_tail_session_513300:
  enabled: true
  etf_code: '513300'
  index_symbol: ^IXIC
  decision_mode: user_final_decision
  technical_thresholds:
    ma25_dev_overheat: 5
    rsi_overbought: 70
    rsi_oversold: 30
  streak_thresholds:
    up_days: 5
    down_days: 3
  timing_signal:
    us_futures_main_contracts:
      - NQ00Y
      - ES00Y
      - YM00Y
    nq_futures_up_dn_threshold: 1
    consensus_rule: at_least_2_of_3
    consensus_fail_action_cap:
      - hold
      - reduce
      - exit_wait
  gate_rules:
    premium_hard_stop:
      enabled: true
      trigger:
        premium_pct_gte: 5
    premium_extreme_exit_bias:
      enabled: true
      trigger:
        premium_pct_gte: 10
    manager_notice_gate:
      enabled: true
      trigger:
        manager_premium_notice: true
        premium_pct_gte: 3
    event_hard_gate:
      enabled: true
      trigger:
        major_event_night: true
    degraded_data_gate:
      enabled: true
      trigger:
        data_quality_in:
          - partial
          - stale
          - degraded
          - estimated
    liquidity_guard_gate:
      enabled: true
      trigger:
        min_amount_yuan_lte: 20000000
  option_profiles:
    conservative:
      max_position_pct: 20
      preferred_actions:
        - hold
        - reduce
        - exit_wait
        - buy_light
    neutral:
      max_position_pct: 40
      preferred_actions:
        - hold
        - reduce
        - buy_light
    aggressive:
      max_position_pct: 60
      preferred_actions:
        - buy_light
        - hold
        - reduce
  risk_notice_state:
    manager_premium_notice: false
  risk_notice_rules:
    premium_notice:
      when:
        premium_pct_gte: 3
      message: 当前溢价偏高，需警惕价格向IOPV回归带来的被动回撤。
    extreme_premium_notice:
      when:
        premium_pct_gte: 5
      message: 当前溢价已达高风险区间，不宜追高。
    discount_notice:
      when:
        premium_pct_lt: 0
      message: 当前处于折价区间，具备一定安全垫。
    overbought_notice:
      when:
        rsi14_gte: 70
      message: 技术面进入过热区域，短线追高风险上升。
    deviation_notice:
      when:
        ma25_dev_pct_gte: 5
      message: 价格相对25日均线偏离过大，需防范均值回归。
    degraded_data_notice:
      when:
        data_quality_in:
          - partial
          - stale
          - degraded
          - estimated
      message: 当前关键数据存在缺口或估算成分，建议降级执行。
