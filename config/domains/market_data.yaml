realtime_full_fetch_cache:
  enabled: true
  ttl_seconds: 45
network:
  proxy:
    default:
      enabled: false
      url: ''
    per_source:
      yfinance:
        enabled: true
        url: http://127.0.0.1:2080
data_sources:
  intraday_tool_spacing_seconds: 0.45
  limit_up:
    # P3: 涨停工具 approved 链（em → previous → strong → sub_new）相邻 AkShare 调用间隔（秒）
    upstream_chain_spacing_seconds: 0.35
  circuit_breaker:
    enabled: true
    error_threshold: 3
    cooldown_seconds: 300
  etf_minute:
    upstream_spacing_seconds: 0.35
    priority:
      - sina
      - eastmoney
    eastmoney:
      enabled: true
      max_retries: 5
      retry_delay: 3
    sina:
      enabled: true
      max_retries: 3
      retry_delay: 1
      referer: http://finance.sina.com.cn
      user_agent: >-
        Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124
        Safari/537.36
  index_minute:
    upstream_spacing_seconds: 0.35
    priority:
      - sina
      - eastmoney
    eastmoney:
      enabled: true
      max_retries: 5
      retry_delay: 3
    sina:
      enabled: true
      max_retries: 3
      retry_delay: 1
      referer: http://finance.sina.com.cn
      user_agent: >-
        Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124
        Safari/537.36
  a50_futures:
    priority:
      - akshare_foreign_hist
    sina:
      enabled: false
      max_retries: 3
      retry_delay: 1
      referer: http://finance.sina.com.cn
      user_agent: >-
        Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124
        Safari/537.36
  global_index:
    hxc:
      enabled: true
    latest:
      priority:
        - yfinance
        - fmp
        - sina
      fmp:
        enabled: true
        api_keys:
          - ${FMP_API_KEY}
          - ${FMP_API_KEY_BACKUP}
  stock_realtime:
    priority:
      - mootdx
      - tushare
      - eastmoney
      - akshare
    mootdx:
      enabled: true
      max_retries: 3
      retry_delay: 1
    akshare:
      enabled: true
      max_retries: 3
      retry_delay: 1
    eastmoney:
      enabled: true
      max_retries: 5
      retry_delay: 3
    tushare:
      enabled: true
      max_retries: 3
      retry_delay: 1
  stock_daily:
    priority:
      - tushare
      - akshare
      - eastmoney
    tushare:
      enabled: true
      max_retries: 3
      retry_delay: 1
    akshare:
      enabled: true
      max_retries: 3
      retry_delay: 1
    eastmoney:
      enabled: true
      max_retries: 5
      retry_delay: 3
  stock_minute:
    upstream_spacing_seconds_between_periods: 0.5
    priority:
      - mootdx
      - akshare
      - eastmoney
    mootdx:
      enabled: true
      max_retries: 3
      retry_delay: 1
    akshare:
      enabled: true
      max_retries: 3
      retry_delay: 1
    eastmoney:
      enabled: true
      max_retries: 5
      retry_delay: 3
  tick:
    primary: alltick
    secondary: itick
    symbols:
      '399006':
        type: index
        itick: 399006.SZ
        alltick: 399006.SZ
        itick_region: SZ
      '000300':
        type: index
        itick: 000300.SH
        alltick: 000300.SH
        itick_region: SH
    providers:
      itick:
        enabled: false
        base_url_rest: https://api-free.itick.org
        base_url_ws: wss://api-free.itick.org
        timeout_ms: 2000
        api_key: ${ITICK_API_KEY}
      alltick:
        enabled: false
        base_url_rest: https://quote.alltick.co/quote-stock-b-api
        base_url_ws: wss://quote.alltick.co/quote-stock-b-ws-api
        timeout_ms: 2000
        api_key: ${ALLTICK_API_KEY}
tushare:
  enabled: true
  token: ${TUSHARE_TOKEN}
  prefer_minute: false
  # 默认 2000 积分档不含表二 stk_mins；已单独开通股票分钟时改为 minute_table2 或设 minute_table2: true
  permission_profile: "2000"
iopv_fallback:
  manual_iopv_overrides:
    '513300':
      iopv: 2.3141
      source: manual_after_14_00
      updated_date: '2026-04-30'
    '513880':
      iopv: 1.8467
      source: manual_after_14_00
      updated_date: '2026-04-30'
wide_inspection_overnight_refs:
  sources:
    a50_futures:
      enabled: false
      provider: pending_integration
    usd_cny:
      enabled: false
      provider: pending_integration
    us_equity_futures:
      enabled: false
      provider: pending_integration
