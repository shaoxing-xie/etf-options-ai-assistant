# etf_codes：运行时与 rotation_config 轮动池并集（见 src/data_cache_universe._merge_rotation_etf_codes_into），
# 保证早盘/收盘日 K 采集覆盖轮动读盘。
data_cache:
  enabled: true
  keep_days: 360
  # 六指数次日方向任务所需指数：
  # 000001(上证), 000300(沪深300), 000688(科创50), 399006(创业板),
  # 000905(中证500), 000852(中证1000)
  # 000922(红利)用于 style spread 辅助特征（缓存优先，不阻塞主链）。
  index_codes:
    - "000001"
    - "000016"
    - "000300"
    - "000688"
    - "000852"
    - "000905"
    - "000922"
    - "399006"
  etf_codes:
    # 基础缓存池（统一清单）：
    # 1) 覆盖 rotation_config.yaml 的 extra_etf_codes（轮动池）
    # 2) 覆盖核心任务/配置中显式使用的重点 ETF（如 510500/513120 等）
    - "510050"
    - "510300"
    - "510500"
    - "512000"
    - "512010"
    - "512100"
    - "512200"
    - "512400"
    - "512480"
    - "512690"
    - "512710"
    - "512760"
    - "513120"
    - "513300"
    - "513880"
    - "515050"
    - "515220"
    - "515790"
    - "515880"
    - "516150"
    - "516160"
    - "588080"
    - "159175"
    - "159206"
    - "159326"
    - "159338"
    - "159361"
    - "159866"
    - "159870"
    - "159880"
    - "159905"
    - "159915"
    - "159928"
  stock_codes:
    - "000617"
    - "000157"
    - "002179"
    - "600000"
    - "000963"
  # 与 A 股日 K 并行：由 data_cache_collection_core 在 morning_daily / close_minute 末尾执行（见 _run_futures_global_daily_warm）。
  futures_daily_warm:
    enabled: true
    calendar_days: 400
    symbols:
      - "A50"
  global_index_daily_warm:
    enabled: true
    hist_limit: 120
    symbols:
      - "^DJI"
      - "^GSPC"
      - "^IXIC"
      - "^N225"
      # 恒生：新浪/东财偶发断连时可临时注释；已增加东财+yfinance 回退（见 fetch_global_hist_sina）
      # - "^HSI"
