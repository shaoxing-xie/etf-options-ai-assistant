# 任务注册表：orchestrator_cli / DAGExecutor 唯一逻辑来源（§0 仓库对齐方案）
# Cron 触发时刻保持不变（§2.1）；每条 jobs.json 可指向 orchestrator_cli run <task_id>
version: "1"
orchestrator:
  enabled: true
defaults:
  retry:
    max_attempts: 3
    delays_seconds: [15, 45, 90]
  timeout_seconds: 1800
tasks:
  - id: daily_health
    description: "运维健康：插件 catalog 摘要 + 语义层质量兜底（无飞书摘要版 audit）"
    enabled: true
    deprecated: false
    dependencies: []
    quality_gates: []
    steps:
      - id: catalog_digest
        kind: tool
        tool: tool_plugin_catalog_digest
        params: {}
        continue_on_failure: true
        timeout_seconds: 180
      - id: attempts_placeholder
        kind: tool
        tool: tool_summarize_attempts
        params:
          attempts_json: "[]"
          dataset_id: global_index_spot
        continue_on_failure: true
        timeout_seconds: 120
      - id: semantic_quality_audit
        kind: exec
        # 使用脚本而非 CLI 包装，避免 orchestrator 单次拉起飞书摘要链
        argv_template:
          - "{python}"
          - "{root}/scripts/semantic_quality_backstop_audit.py"
          - "--no-notify"
        continue_on_failure: false
        timeout_seconds: 900

  - id: unified_pre_open
    description: "盘前/开盘前置数据子图（占位，Phase2 与 YAML 合并对齐）"
    enabled: false
    deprecated: false
    dependencies: []
    steps: []

  - id: data_pipeline
    description: "统一数据采集入口（job 由 context.job 或 profile 注入；共享缓存键=tool 的 job 名）"
    enabled: false
    deprecated: false
    dependencies: []
    # 方案 §9：同刻多 exec 争用时串行化（fcntl 文件锁；ORCHESTRATOR_NO_FILE_LOCK=1 可旁路）
    concurrency:
      file_lock: true
      lock_acquire_timeout_seconds: 3600
    steps:
      - id: run_cache_job
        kind: tool
        tool: tool_run_data_cache_job
        params:
          job: morning_daily
          notify: false
        continue_on_failure: false
        timeout_seconds: 3600

  - id: unified_intraday
    description: "盘中监控/巡检：context.phase 覆盖巡检相位（与宽基巡检 Cron 对齐）"
    enabled: false
    deprecated: false
    dependencies: []
    steps:
      - id: signal_risk_inspection
        kind: tool
        tool: tool_run_signal_risk_inspection_and_send
        params:
          mode: test
          fetch_mode: test
          phase: morning
        params_from_context:
          - phase
        continue_on_failure: true
        timeout_seconds: 900

  - id: unified_after_close
    description: "盘后：预测验证血缘（tool_get_yesterday_prediction_review）+ 日后接入日报链"
    enabled: false
    deprecated: false
    dependencies: []
    steps:
      - id: prediction_verification
        kind: tool
        tool: tool_get_yesterday_prediction_review
        params: {}
        continue_on_failure: true
        timeout_seconds: 600

  - id: weekly_research
    description: "周度轮动/定调（占位）"
    enabled: false
    deprecated: false
    dependencies: []
    steps: []

  - id: nightly_screening
    description: "夜筛（占位）"
    enabled: false
    deprecated: false
    dependencies: []
    steps: []

  - id: on_demand_evolver
    description: "按需演化（Agent，占位登记）"
    enabled: false
    deprecated: false
    task_type: interactive
    steps: []
