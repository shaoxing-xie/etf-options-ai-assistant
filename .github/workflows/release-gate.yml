name: release-gate

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch openclaw-data-china-stock (plugins/data_collection symlink)
        run: |
          set -euo pipefail
          SIB="${GITHUB_WORKSPACE}/../openclaw-data-china-stock"
          git clone --depth 1 https://github.com/shaoxing-xie/openclaw-data-china-stock.git "$SIB"

      - name: Link plugins/data_collection
        run: ./scripts/link_china_stock_data_collection.sh

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pyyaml pytest-timeout

      - name: Lint (minimum)
        run: |
          ruff check scripts/release_safety_gate.py scripts/check_json_syntax.py scripts/ensure_openclaw_plugin_load_paths.py scripts/validate_config_surface.py scripts/check_universe_ssot.py scripts/validate_config_cross.py

      - name: JSON syntax check
        run: |
          python scripts/check_json_syntax.py

      - name: Release safety gate
        run: |
          python scripts/release_safety_gate.py

      - name: Config surface (required top-level keys)
        run: python scripts/validate_config_surface.py

      - name: Universe SSOT hard checks
        run: python scripts/check_universe_ssot.py

      - name: Config cross-validate (hard errors fail)
        run: python scripts/validate_config_cross.py

      - name: Test ensure_openclaw_plugin_load_paths
        run: |
          python -m pytest tests/test_ensure_openclaw_plugin_load_paths.py -m "not network" -q

      - name: Skills contract sniff (no akshare under skills/) + payload quality
        run: |
          python -m pytest tests/test_no_akshare_sniff.py tests/test_tool_payload_quality.py -m "not network" -q

      - name: Optional runtime vs src plugin version (skip if no ~/.openclaw runtime)
        run: |
          python -m pytest tests/test_plugin_runtime_drift.py -m "not network" -q

      - name: Contract shapes (assistant, no integration / no network)
        run: |
          python -m pytest tests/test_plugin_tool_contract_shapes.py -m "not integration and not network" -q

      - name: Market snapshot build (offline; excludes @pytest.mark.network)
        run: |
          python -m pytest tests/test_market_snapshot_build.py -m "not network" -q --timeout=120

      - name: Error codes YAML vs plugin Python sync
        run: |
          python scripts/check_error_codes_sync.py

      - name: Plugin probe source health tests
        working-directory: ${{ github.workspace }}/../openclaw-data-china-stock
        run: |
          python -m pytest tests/test_probe_source_health.py tests/test_source_health_rollup.py -m "not network" -q

  network-smoke:
    runs-on: ubuntu-latest
    needs: [gate]
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch openclaw-data-china-stock (plugins/data_collection symlink)
        run: |
          set -euo pipefail
          SIB="${GITHUB_WORKSPACE}/../openclaw-data-china-stock"
          git clone --depth 1 https://github.com/shaoxing-xie/openclaw-data-china-stock.git "$SIB"

      - name: Link plugins/data_collection
        run: ./scripts/link_china_stock_data_collection.sh

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project + pytest-timeout
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest-timeout

      - name: QDII / global_spot chain (@pytest.mark.network)
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          python -m pytest tests/test_market_snapshot_build.py -m network -v --timeout=600
